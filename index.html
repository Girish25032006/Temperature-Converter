<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>converter</title>
  <link rel="stylesheet" href="index.css" >
</head>
<body>
  <div class="main_div">
    
    <h1 class="title">Temperature Convertor<h1>
  
   <div class="selector">
      <div>
        <input type="number" placeholder="Enter The Celcius" class="js-input">
      </div>
      <div class="Convertor_name">
        <select>
          <option selected value="Celcius to Fahrenheit">Celcius to Fahrenheit</option>
          <option  value="Fahrenheit to Celcius">Fahrenheit to Celcius</option>
          <option value="Celcius to Kelvin">Celcius to Kelvin</option>
          <option value= "Kelvin to Celcius">Kelvin to Celcius</option>
          <option value="Fahrenheit to Kelvin">Fahrenheit to Kelvin</option>
          <option value="Kelvin to Fahrenheit">Kelvin to Fahrenheit</option>
        </select>
      </div>
   </div>
    <div class="button-div">
      <button
      onclick="convert(); 
      
      "
      class="convert-button">Convert</button>
    </div>
    <div class="result-div">
      <p class="result"></p>
    </div>
  </div>

  <script>
    function convert(){
      let Celcius = Number(document.querySelector('.js-input').value) ;
      let fahrenheit = ((Celcius*1.8)+32);
      let result = document.querySelector('.result');
      result.innerHTML = fahrenheit + ' &degF'; 
    }
  </script>
  
</body>
</html>
